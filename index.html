<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 2 · Gladiator Dossier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{--travertine:#e7d8b6;--travertine-dk:#cdb888;--stone-line:#b09a6a;
        --red:#7c1a16;--red-dk:#5a110e;--gold:#c9a227;--gold-lt:#e7c75a;
        --ink:#2a1f15;--ink-soft:#4a3a28;--parch:#f3e8cd;--green:#3c5a3c;--blue:#2c4a63}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'EB Garamond',Georgia,serif;color:var(--ink);
       background:radial-gradient(ellipse at 50% -10%,#3a1410,#2a0e0b 45%,#1c0908);min-height:100vh;padding-bottom:50px}
  .crown{height:14px;background:repeating-linear-gradient(90deg,var(--gold) 0 26px,var(--red-dk) 26px 52px)}
  .back{position:absolute;left:18px;top:24px;color:var(--gold-lt);text-decoration:none;font-family:'Cinzel';font-size:.78rem;letter-spacing:.1em;z-index:9}

  header{text-align:center;padding:24px 20px 4px}
  .trial{font-family:'Cinzel';color:var(--gold-lt);letter-spacing:.3em;font-size:.72rem;text-transform:uppercase}
  h1{font-family:'Cinzel';font-weight:900;color:var(--parch);font-size:clamp(1.5rem,5vw,2.4rem);letter-spacing:.03em;text-shadow:0 3px 0 #000;margin-top:5px}
  .who{color:#e9d9b6;font-size:.92rem;margin-top:8px;min-height:1.2em}

  .prog{max-width:760px;margin:14px auto 0;padding:0 18px;display:flex;gap:5px}
  .prog .seg{flex:1;height:7px;border-radius:5px;background:#5a3a2a;border:1px solid var(--gold);overflow:hidden}
  .prog .seg.done{background:var(--gold)}
  .prog .seg.cur{background:var(--gold-lt);box-shadow:0 0 8px var(--gold-lt)}

  .stage{max-width:760px;margin:16px auto 0;padding:0 18px}
  .panel{background:linear-gradient(180deg,var(--travertine),var(--travertine-dk));
         border:3px solid var(--stone-line);border-radius:18px;padding:24px;
         box-shadow:0 16px 30px rgba(0,0,0,.5),inset 0 3px 0 rgba(255,255,255,.45)}
  .pstep{font-family:'Cinzel';color:var(--gold);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase}
  .ptitle{font-family:'Cinzel';font-weight:700;color:var(--red-dk);font-size:1.3rem;margin:3px 0 6px}
  .ptext{font-size:1.02rem;color:var(--ink-soft);margin-bottom:12px}
  .ptext i,.ptext b{color:var(--red-dk)}

  label.f{display:block;font-family:'Cinzel';font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;color:var(--red);margin:12px 0 4px}
  input[type=text],input[type=number],select,textarea{width:100%;font-family:'EB Garamond',serif;font-size:1rem;color:var(--ink);
     background:var(--parch);border:2px solid var(--stone-line);border-radius:9px;padding:9px 11px}
  textarea{min-height:72px;resize:vertical}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--red)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>div{flex:1;min-width:160px}

  .talk{background:rgba(44,74,99,.1);border-left:4px solid var(--blue);border-radius:0 10px 10px 0;padding:9px 13px;margin:10px 0;font-size:.92rem}
  .talk b{font-family:'Cinzel';font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);display:block;margin-bottom:2px}

  .opts{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .opt{display:block;text-align:left;cursor:pointer;font-family:'EB Garamond',serif;font-size:1rem;
       background:var(--parch);border:2px solid var(--stone-line);border-radius:11px;padding:12px 14px;color:var(--ink);transition:.14s}
  .opt:hover{border-color:var(--red);transform:translateX(3px)}
  .opt.sel{border-color:var(--red);background:#fff;box-shadow:0 4px 12px rgba(124,26,22,.25)}
  .opt b{font-family:'Cinzel';font-size:.72rem;letter-spacing:.05em;text-transform:uppercase;color:var(--red);display:block;margin-bottom:2px}
  .opt.ok{border-color:var(--green);background:#eef6ec}
  .opt.bad{border-color:#b3402f;background:#fbecea}

  /* retrieval starter */
  .retq{margin:12px 0}
  .retq .qn{font-family:'Cinzel';font-size:.7rem;letter-spacing:.03em;color:var(--red);text-transform:uppercase;margin-bottom:5px}
  .retscore{font-family:'Cinzel';font-size:.82rem;margin-top:12px;padding:9px 12px;border-radius:8px;background:rgba(201,162,39,.16);border:1px solid var(--gold);color:var(--red-dk);display:none}
  .retscore.show{display:block}

  /* sentence-starter hint reveal */
  .hint{display:none;margin-top:8px}
  .hint.show{display:block}

  /* in-the-moment hinge check */
  .hingebox{background:rgba(60,90,60,.08);border:1px dashed var(--green);border-radius:10px;padding:11px 14px;margin:10px 0}
  .hingebox .ht{font-family:'Cinzel';font-size:.62rem;letter-spacing:.07em;text-transform:uppercase;color:var(--green);margin-bottom:6px}
  .hingeres{font-family:'Cinzel';font-size:.78rem;margin-top:8px;display:none}
  .hingeres.show{display:block}
  .hingeres.good{color:var(--green)}.hingeres.bad{color:#b3402f}

  .evid{background:rgba(124,26,22,.09);border-left:4px solid var(--red);border-radius:0 10px 10px 0;padding:12px 14px;margin:12px 0}
  .evid .t{font-family:'Cinzel';font-size:.6rem;letter-spacing:.13em;text-transform:uppercase;color:var(--red)}
  .evid .b{margin-top:5px;font-size:.98rem}
  .evid .b .lat{font-family:'Cinzel';color:var(--red-dk);font-weight:700}
  .evid .cite{font-size:.74rem;color:var(--ink-soft);margin-top:5px;font-style:italic}

  /* matcher (who's who) */
  .match{display:flex;flex-direction:column;gap:9px;margin-top:8px}
  .mrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .mrow .role{flex:0 0 168px;font-family:'Cinzel';font-weight:700;color:var(--red-dk);font-size:.92rem;background:var(--parch);border:2px solid var(--stone-line);border-radius:9px;padding:8px 10px}
  .mrow select{flex:1;min-width:180px}

  /* key idea + sorter (enquiry) */
  .keyidea{background:rgba(201,162,39,.16);border:1px solid var(--gold);border-radius:10px;padding:10px 13px;margin:6px 0;font-size:.96rem}
  .keyidea b{font-family:'Cinzel';color:var(--red-dk)}
  .sorter{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
  .tray{flex:0 0 226px;display:flex;flex-direction:column;gap:9px;min-width:210px}
  .tray .tlab{font-family:'Cinzel';font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft)}
  .planewrap{flex:1;min-width:290px}
  .scard{background:var(--parch);border:2px solid var(--stone-line);border-radius:9px;padding:8px 10px;cursor:grab;
         box-shadow:0 3px 8px rgba(0,0,0,.22);touch-action:none;user-select:none}
  .scard.placed{position:absolute;width:140px;z-index:3;padding:6px 8px}
  .scard .sct{font-family:'Cinzel';font-weight:700;font-size:.7rem;color:var(--red);line-height:1.1}
  .scard .scq{font-size:.78rem;margin-top:2px;font-style:italic}
  .scard.placed .scq{display:none}
  .plane{position:relative;height:400px;border-radius:12px;overflow:hidden;border:2px solid var(--stone-line);
         background:linear-gradient(135deg,rgba(124,26,22,.10),rgba(44,74,99,.10)),radial-gradient(circle at 50% 50%,#efe3c4,#d7c197)}
  .plane .ax{position:absolute;background:rgba(90,17,14,.32)}
  .plane .ax.v{left:50%;top:0;bottom:0;width:2px}.plane .ax.h{top:50%;left:0;right:0;height:2px}
  .axlab{position:absolute;font-family:'Cinzel';font-size:.56rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);background:rgba(243,232,205,.72);padding:2px 5px;border-radius:5px;text-align:center}
  .axlab.top{top:5px;left:50%;transform:translateX(-50%)}.axlab.bot{bottom:5px;left:50%;transform:translateX(-50%)}
  .axlab.left{left:5px;top:50%;transform:translateY(-50%)}.axlab.right{right:5px;top:50%;transform:translateY(-50%)}

  .cardrows{display:flex;flex-direction:column;gap:7px;margin-top:6px}
  .cardrows .sr{display:flex;align-items:center;gap:10px}
  .cardrows .sr label{flex:0 0 150px;font-family:'Cinzel';font-size:.62rem;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-soft)}
  .cardrows .sr input{flex:0 0 80px}
  .cardrows .sr .bar{flex:1;height:9px;background:#d8c49a;border:1px solid #bfa978;border-radius:6px;overflow:hidden}
  .cardrows .sr .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--gold))}

  /* self-check feedback */
  select.right{border-color:var(--green)!important;background:#eef6ec}
  select.wrong{border-color:#b3402f!important;background:#fbecea}
  .checkres{font-family:'Cinzel';font-size:.72rem;letter-spacing:.04em;margin-top:8px;color:var(--ink-soft)}
  .checkres.good{color:var(--green)}
  .checkres.bad{color:#b3402f}

  /* labelled plan of the ludus */
  .plan{max-width:540px;margin:10px auto 4px;background:var(--parch);border:2px solid var(--stone-line);border-radius:12px;padding:12px 12px 6px}
  .plan svg{width:100%;height:auto;display:block}
  .plan .cap{font-family:'Cinzel';font-size:.58rem;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-soft);text-align:center;margin-top:6px}

  /* real artefact figures */
  .fig{margin:12px 0;border:2px solid var(--stone-line);border-radius:10px;overflow:hidden;background:#1c0908}
  .fig img{width:100%;height:auto;display:block}
  .fig figcaption{font-size:.82rem;color:var(--ink-soft);background:var(--parch);padding:7px 11px;line-height:1.35}
  .fig figcaption b{font-family:'Cinzel';color:var(--red-dk)}
  .fig .cr{display:block;font-size:.64rem;color:#8a7a5c;margin-top:2px}
  .fig .imgalt{display:none;font-size:.9rem;color:var(--ink-soft);background:var(--parch);padding:11px 13px;line-height:1.4}
  .fig .imgalt b{font-family:'Cinzel';color:var(--red-dk)}

  /* Verba — the Latin layer */
  .verba{background:rgba(201,162,39,.16);border:1px solid var(--gold);border-radius:10px;padding:12px 14px;margin:12px 0}
  .verba .vt{font-family:'Cinzel';font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:6px}
  .verba table{width:100%;border-collapse:collapse;font-size:.92rem}
  .verba td{padding:3px 6px;vertical-align:top;border-bottom:1px solid rgba(176,154,106,.4)}
  .verba td.w{font-family:'Cinzel';color:var(--red-dk);font-weight:700;white-space:nowrap;width:40%}
  .verba td .lat{font-family:'Cinzel';color:var(--red-dk);font-weight:700}
  .verba .foot{font-size:.8rem;color:var(--ink-soft);font-style:italic;margin-top:7px}
  .quote-lat{background:#fff;border:2px dashed var(--red);border-radius:9px;padding:9px 12px;margin:8px 0;font-family:'Cinzel';color:var(--red-dk);font-size:1rem;text-align:center;letter-spacing:.02em;line-height:1.5}

  /* balance-scale weigh-up */
  .scalewrap{max-width:440px;margin:8px auto 2px}
  .scalewrap svg{width:100%;height:auto;display:block}
  #beam{transition:transform .35s ease}
  .verdict{text-align:center;font-family:'Cinzel';font-weight:700;color:var(--red-dk);font-size:.96rem;margin:2px 0 10px;min-height:1.2em}
  .weighrows{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .wrow{background:var(--parch);border:2px solid var(--stone-line);border-radius:10px;padding:9px 11px}
  .wrow .wt{font-family:'Cinzel';font-weight:700;color:var(--red);font-size:.84rem}
  .wrow .wq{font-size:.86rem;font-style:italic;color:var(--ink-soft);margin:2px 0 7px}
  .wbtns{display:flex;gap:8px}
  .wbtns button{flex:1;font-family:'Cinzel';font-size:.7rem;letter-spacing:.03em;border:2px solid var(--stone-line);border-radius:8px;padding:7px;cursor:pointer;background:#fff;color:var(--ink-soft)}
  .wbtns button.sel{color:#fff}
  .wbtns button.prison.sel{background:#5a3550;border-color:#5a3550}
  .wbtns button.academy.sel{background:var(--green);border-color:var(--green)}

  /* weigh columns in the dossier */
  .weighcols{display:flex;gap:10px;margin:4px 0}
  .weighcols .wc{flex:1;border:1.5px solid var(--stone-line);border-radius:8px;padding:6px 9px;background:#faf4e4}
  .weighcols .wch{font-family:'Cinzel';font-size:.64rem;text-transform:uppercase;color:var(--red);margin-bottom:3px}
  .weighcols .wci{font-size:.84rem;margin:1px 0}
  .weighcols .wci.empty{color:#c08a8a}

  /* timeline (order the day) */
  .timeline{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .tslot{display:flex;gap:10px;align-items:center}
  .tslot .tn{flex:0 0 26px;height:26px;border-radius:50%;background:var(--red);color:var(--parch);font-family:'Cinzel';font-weight:700;font-size:.8rem;display:flex;align-items:center;justify-content:center}
  .tslot select{flex:1}

  .stems .stem{background:var(--parch);border:1px dashed var(--red);border-radius:8px;padding:7px 11px;margin:6px 0;font-style:italic;font-size:.9rem}
  .vocab{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0}
  .vocab span{background:var(--red);color:var(--parch);font-family:'Cinzel';font-size:.6rem;letter-spacing:.04em;padding:3px 9px;border-radius:14px}

  .crit{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .crit li{display:flex;gap:9px;align-items:flex-start;background:var(--parch);border:1px solid var(--stone-line);border-radius:9px;padding:9px 11px;cursor:pointer}
  .crit li.on{border-color:var(--green);background:#f0f6ee}
  .crit .tick{flex:0 0 22px;height:22px;border:2px solid var(--stone-line);border-radius:5px;text-align:center;font-weight:700;color:#fff}
  .crit li.on .tick{background:var(--green);border-color:var(--green)}
  .crit .ct{font-size:.92rem}.crit .ct b{font-family:'Cinzel';font-size:.62rem;color:var(--red);display:block}

  .rag{display:flex;gap:10px;margin-top:6px}
  .rag button{flex:1;font-family:'Cinzel';font-size:.74rem;border:2px solid var(--stone-line);border-radius:10px;padding:10px;cursor:pointer;background:var(--parch)}
  .rag button.sel{border-color:#000;box-shadow:0 0 0 2px var(--gold)}

  .nav{display:flex;justify-content:space-between;gap:12px;margin-top:18px;align-items:center;flex-wrap:wrap}
  .btn{font-family:'Cinzel';background:var(--red);color:var(--parch);border:none;padding:12px 24px;border-radius:30px;
       font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;box-shadow:0 5px 12px rgba(0,0,0,.35)}
  .btn:hover{background:var(--red-dk)}
  .btn.ghost{background:transparent;border:2px solid var(--red);color:var(--red-dk);box-shadow:none}
  .btn.gold{background:transparent;border:2px solid var(--gold);color:var(--gold-lt);box-shadow:none}
  .btn.gold:hover{background:rgba(201,162,39,.18)}
  .btn.sm{padding:8px 14px;font-size:.66rem}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .saved{font-size:.74rem;color:var(--ink-soft);font-style:italic}
  .note{font-size:.84rem;color:var(--ink-soft);font-style:italic;margin-top:8px}
  .toolbar{max-width:760px;margin:8px auto 0;padding:0 18px;display:flex;justify-content:flex-end;gap:8px}

  /* completeness modal */
  .modal{position:fixed;inset:0;background:rgba(20,8,6,.7);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.on{display:flex}
  .modal .box{background:var(--parch);border:3px solid var(--gold);border-radius:14px;max-width:460px;padding:22px 24px}
  .modal h3{font-family:'Cinzel';color:var(--red);font-size:1.1rem;margin-bottom:8px}
  .modal ul{margin:6px 0 12px 18px}.modal li{font-size:.92rem;margin:3px 0}
  .modal .mnav{display:flex;gap:10px;justify-content:flex-end}

  /* ===== DOSSIER (review + print) ===== */
  #dossier{display:none}
  body.show-dossier .crown,body.show-dossier header,body.show-dossier .prog,body.show-dossier .stage,body.show-dossier .back,body.show-dossier .toolbar{display:none}
  body.show-dossier #dossier{display:block}
  .doc{max-width:760px;margin:18px auto 0;background:#fff;border-radius:8px;padding:30px 34px;color:var(--ink)}
  .doc .dh{border-bottom:3px solid var(--gold);padding-bottom:10px;margin-bottom:6px}
  .doc .dh .et{font-family:'Cinzel';color:var(--gold);letter-spacing:.16em;text-transform:uppercase;font-size:.62rem}
  .doc .dh h2{font-family:'Cinzel';color:var(--red);font-size:1.5rem;margin:2px 0}
  .doc .meta{font-size:.92rem;color:var(--ink-soft)}
  .summary{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 4px}
  .summary .pill{border:1px solid var(--stone-line);border-radius:8px;padding:7px 11px;font-size:.84rem;background:#faf4e4}
  .summary .pill b{font-family:'Cinzel';font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--red);display:block}
  .doc h3{font-family:'Cinzel';color:var(--red-dk);font-size:.95rem;margin:14px 0 3px;border-bottom:1px solid #e0d2af;padding-bottom:2px}
  .doc .ans{font-size:.94rem;white-space:pre-wrap;margin:2px 0}
  .doc .ans.empty{color:#c08a8a;font-style:italic}
  .doc .cardmini{border:2px solid var(--red);border-radius:10px;padding:10px 12px;margin-top:4px}
  .doc .cardmini .cn{font-family:'Cinzel';font-weight:700;color:var(--red)}
  .doc .statline{display:flex;align-items:center;gap:8px;font-size:.86rem;margin:2px 0}
  .doc .statline .sl{flex:0 0 140px;font-family:'Cinzel';font-size:.6rem;text-transform:uppercase;color:var(--ink-soft)}
  .doc .statline .sb{flex:1;height:8px;background:#eaddbf;border-radius:5px;overflow:hidden}
  .doc .statline .sb i{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--gold))}
  .doc .statline .sv{flex:0 0 34px;text-align:right;font-weight:700}
  .doc .daylist{margin:4px 0 0 0;padding:0;list-style:none;counter-reset:d}
  .doc .daylist li{font-size:.9rem;margin:2px 0;padding-left:24px;position:relative}
  .doc .daylist li::before{counter-increment:d;content:counter(d);position:absolute;left:0;top:0;width:17px;height:17px;background:var(--red);color:#fff;border-radius:50%;font-size:.62rem;text-align:center;line-height:17px;font-family:'Cinzel'}
  .miniplane{position:relative;width:260px;height:200px;border:1.5px solid var(--stone-line);border-radius:8px;margin:6px 0;
             background:linear-gradient(135deg,rgba(124,26,22,.08),rgba(44,74,99,.08))}
  .miniplane .mv{position:absolute;left:50%;top:0;bottom:0;width:1px;background:#cbb78a}
  .miniplane .mh{position:absolute;top:50%;left:0;right:0;height:1px;background:#cbb78a}
  .miniplane .dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--red);transform:translate(-50%,-50%)}
  .miniplane .dl{position:absolute;font-size:.56rem;color:var(--red-dk);transform:translate(-50%,-150%);white-space:nowrap;font-weight:700}
  .planenote{font-size:.7rem;color:var(--ink-soft)}
  .handin{background:#f6ecd9;border:1px solid var(--gold);border-radius:8px;padding:10px 13px;margin-top:16px;font-size:.9rem}
  .handin b{color:var(--red-dk);font-family:'Cinzel'}
  .docnav{max-width:760px;margin:14px auto 0;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

  @media print{
    @page{size:A4;margin:12mm}
    body{background:#fff!important}
    .crown,header,.prog,.stage,.back,.docnav,.toolbar,.modal{display:none!important}
    #dossier{display:block!important}
    .doc{max-width:none;margin:0;padding:0;box-shadow:none}
    .doc .dh,.doc .cardmini,.statline .sb i,.handin,.summary .pill,.miniplane .dot{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    h3,.cardmini,.miniplane{break-inside:avoid}
  }
</style>
</head>
<body>
<div class="crown"></div>
<a class="back" href="../index.html">← Ludus</a>
<header>
  <div class="trial">Trial II · Interactive Dossier</div>
  <h1>Life in the Ludus</h1>
  <div class="who" id="who"></div>
</header>

<div class="prog" id="prog"></div>
<div class="toolbar"><button class="btn gold sm" onclick="downloadBackup()">⬇ Backup my answers</button></div>
<div class="stage"><div class="panel" id="panel"></div></div>

<!-- completeness modal -->
<div class="modal" id="modal"><div class="box">
  <h3>Before you hand in…</h3>
  <div id="modalBody"></div>
  <div class="mnav">
    <button class="btn ghost" onclick="closeModal()">← Go back</button>
    <button class="btn" onclick="closeModal();reallyOpenDossier()">Review anyway →</button>
  </div>
</div></div>

<!-- review / print -->
<div id="dossier">
  <div class="doc" id="doc"></div>
  <div class="docnav">
    <button class="btn ghost" onclick="closeDossier()">← Back to edit</button>

function panelComprehension(){
  document.getElementById('panel').innerHTML=`
    <div class="pstep">Step 4 of 8 · Reading the evidence</div>

    <figure class="fig">

    </figure>

    <div class="evid"><div class="t">⚑ Source A — “the barley men”</div><div class="b">
      Roman writers nicknamed gladiators <span class="lat">hordearii</span> — <b>“barley men”</b> — because their diet was built on barley and beans, not meat. This was deliberate: a starchy, plant-heavy diet padded the body with a layer of fat just under the skin. A cut to that fatty layer bled dramatically for the crowd, but was far less likely to reach a muscle or organ — so a fighter could be wounded, look spectacular, and still survive to fight another day.<br><br>
      When archaeologists studied the bones from a <b>gladiator cemetery at Ephesus</b>, chemical analysis confirmed part of this: a mostly plant-based diet, plus traces of a drink made from <b>plant ash</b> — a kind of ancient calcium supplement to strengthen bones after injury.<br><br>
      <b>But think like a historian:</b> the bones prove the <i>diet</i>; the idea that the fat was deliberate <i>“armour”</i> is what modern scholars <b>conclude</b> from it — no Roman ever wrote that down. It is a strong <b>interpretation</b> of the evidence, not a recorded fact.</div>
      <div class="cite">Pliny, Natural History 18; Grossschmidt &amp; Kanz, bone analysis of the Ephesus gladiator cemetery</div></div>

      <div class="opts" id="hingeOpts">

      </div>
      <div class="hingeres" id="hingeRes"></div>
    </div>
    <label class="f">1 · Why were gladiators deliberately fed a fattening barley-and-bean diet? Give the reason, not just the fact.</label><textarea id="q1"></textarea>
    <label class="f">1b · Which part of Source A is solid <i>evidence</i>, and which part is a scholar's <i>interpretation</i>? Explain how you can tell.</label><textarea id="q1b"></textarea>

    <div class="evid"><div class="t">⚑ Source B — training at the stake</div><div class="b">

      <div class="cite">Vegetius, On Military Matters 1.11 (describing the gladiatorial training method)</div></div>
    <label class="f">2 · Why might it help a fighter to train against a post with a sword and shield that were heavier than the real thing?</label><textarea id="q2"></textarea>

    <div class="evid"><div class="t">⚑ Source C — the gladiators' doctor</div><div class="b">
      The famous physician <span class="lat">Galen of Pergamon</span> took a job as doctor to a troupe of gladiators (around AD 157). He later boasted that very few of his fighters died, where the doctor before him had lost many — by treating wounds carefully and managing their diet and exercise, he kept his investment alive. It was, in effect, some of the earliest <b>sports medicine</b> in history.</div>

    <label class="f">3 · A lanista paid good money for a doctor like Galen. What does that tell us about how a school viewed its gladiators?</label><textarea id="q3"></textarea>

      The doctor's job was to keep men alive — but every gladiator's life ended somewhere, and Romans recorded it in stone. A tombstone from Sicily commemorates <b>Flamma</b>, a <span class="lat">secutor</span>. Its opening, lightly expanded from the carved abbreviations, reads:
      <div class="quote-lat">FLAMMA · SECUTOR · VIXIT · ANNŌS · XXX</div>
      — "Flamma the secutor <b>lived 30 years</b>". The verb <span class="lat">vīxit</span> ("he lived") comes from <span class="lat">vīvō, vīvere, vīxī</span> — "to live"; the present "he lives" is <span class="lat">vivit</span>. The stone then lists his record: <i>fought 34, won 21, drew 9, was <b>spared</b> (<span class="lat">missus</span>) 4 times</i>.<br><br>
      <b>Think like a historian:</b> people often retell this as "Flamma <i>refused his freedom</i> four times" — but <span class="lat">missus</span> just means he was <b>spared after losing</b>. The myth grew from a misread word. (You'll meet Flamma's full story again later in the unit.)</div>

    <div class="ptitle" style="font-size:1.06rem;margin-top:18px">Prison or academy?</div>

    <div class="evid"><div class="t">⚑ Source D — locked in</div><div class="b">
      Most gladiators were slaves or condemned criminals, the legal <b>property</b> of the lanista, with no say over their own lives. In the excavated <b>gladiator barracks at Pompeii</b>, the cells were small and cramped — and archaeologists found a set of <b>iron leg-stocks</b>, in which men could be shackled by the ankles. Some gladiators were clearly locked up so they could not run away or rebel.</div>

</svg>`; }
function drawScale(){
  const c={prison:0,academy:0};
  Object.values(S.scale||{}).forEach(s=>{ if(c[s]!=null) c[s]++; });
  const net=c.academy-c.prison, ang=Math.max(-18,Math.min(18,net*6));
  const beam=document.getElementById('beam'); if(beam) beam.setAttribute('transform',`rotate(${ang} 200 88)`);
  const p=document.getElementById('cnPrison'), a=document.getElementById('cnAcademy');
  if(p) p.textContent=c.prison; if(a) a.textContent=c.academy;
  const v=document.getElementById('verdict'); if(!v) return;
  const total=c.prison+c.academy;
  v.textContent = total<SRC.length ? `Weighing the evidence… (${total} / ${SRC.length} placed)`
    : net===0 ? '⚖ Evenly balanced — your call'
    : net>0 ? '⚖ The evidence tips towards: a PROFESSIONAL ACADEMY'
    : '⚖ The evidence tips towards: a PRISON';
}

    return `<div class="statline"><span class="sl">${l}</span><span class="sb"><i style="width:${v}%"></i></span><span class="sv">${has?v:'–'}</span></div>`; }).join('');
  const sc={prison:[],academy:[]};
  Object.entries(S.scale||{}).forEach(([id,side])=>{ const s=SRC.find(x=>x.id===id); if(s&&sc[side]) sc[side].push(s.t); });
  const net=sc.academy.length-sc.prison.length, totalW=sc.prison.length+sc.academy.length;
  const tip = totalW<SRC.length ? 'not all weighed' : net===0 ? 'sat evenly balanced' : net>0 ? 'tipped towards an ACADEMY' : 'tipped towards a PRISON';
  const selfA=CRIT.filter(c=>S[c.k]).map(c=>c.b).join(', ')||'none ticked';
  const dayOrder=Object.keys(S.day||{}).length? Object.keys(S.day).sort((a,b)=>a-b)
      .map(i=>{ const j=S.day[i]; return (j!==''&&j!=null)?DAY[+j]:null; }).filter(Boolean):[];
  document.getElementById('doc').innerHTML=`
    <div class="dh"><div class="et">Roman Gladiators · Lesson 2 Dossier</div>
      <h2>Life in the Ludus</h2>
      <div class="meta"><b>${esc((S.name||'')+' '+(S.surname||''))}</b> &nbsp;·&nbsp; Class ${esc(S.cls||'—')} &nbsp;·&nbsp; Team ${esc(S.team||'—')}</div></div>
    <div class="summary">
      <div class="pill"><b>Confidence</b>${esc(S.rag||'—')}</div>
      <div class="pill"><b>Self-assessment</b>${esc(selfA)}</div>
      <div class="pill"><b>Retrieval</b>${(S.retScore!=null)?S.retScore+' / '+RET.length:'—'}</div>
      <div class="pill"><b>Completed</b>${TOTAL-missingList().length} / ${TOTAL} core tasks</div>
    </div>
    <h3>Who ran the ludus — and how organised it was</h3>${A(S.orgWhy)}
    <div class="ans"><b>The secret tunnel tells us:</b></div>${A(S.tunnel)}
    <h3>Source questions</h3>
    <div class="ans"><b>1 · The barley diet:</b></div>${A(S.q1)}
    <div class="ans"><b>1b · Evidence vs interpretation:</b></div>${A(S.q1b)}
    <div class="ans"><b>2 · Training at the palus:</b></div>${A(S.q2)}
    <div class="ans"><b>3 · Paying for a doctor:</b></div>${A(S.q3)}
    <div class="ans"><b>4 · Latin — VIXIT (vivit vs vīxit):</b></div>${A(S.qLat)}
    <div class="ans"><b>5 · Prison vs academy — evidence:</b></div>${A(S.q4)}
    <div class="ans"><b>6 · Which evidence to trust:</b></div>${A(S.q5)}
    <h3>Prison or academy — my judgement</h3>${A(S.enquiry)}
    ${S.challenge&&S.challenge.trim()?`<div class="ans"><b>Challenge (why kindness can be crueller):</b></div>${A(S.challenge)}`:''}
    <div class="ans" style="margin-top:6px"><b>How I weighed the evidence — the scales ${tip}:</b></div>
    <div class="weighcols">
      <div class="wc"><div class="wch">⛓ Prison</div>${sc.prison.length?sc.prison.map(t=>`<div class="wci">${esc(t)}</div>`).join(''):'<div class="wci empty">—</div>'}</div>
      <div class="wc"><div class="wch">🏛 Academy</div>${sc.academy.length?sc.academy.map(t=>`<div class="wci">${esc(t)}</div>`).join(''):'<div class="wci empty">—</div>'}</div>
    </div>
    <h3>My Ludus-Staff card</h3>
    <div class="cardmini"><div class="cn">${esc(S.staffName||'(unnamed)')} ${S.staffRole?'· '+esc(S.staffRole):''}</div>${staffStatRows}
      <div class="ans" style="margin-top:6px"><b>Weak fighter, strong elsewhere — why:</b></div>${A(S.staffWhy)}
      <div class="ans"><b>Motto:</b> ${esc(S.staffQuote||'—')}</div></div>
    <h3>A day in the ludus</h3>
    ${dayOrder.length?`<ol class="daylist">${dayOrder.map(d=>`<li>${esc(d)}</li>`).join('')}</ol>`:`<div class="ans empty">— day not ordered —</div>`}
    <div style="margin-top:6px">${A(S.diary)}</div>
    <h3>Exit ticket</h3>
    <div class="ans"><b>New word:</b> ${esc(S.word||'—')}</div>
    <div class="ans"><b>One-line verdict:</b></div>${A(S.verdict)}
    <div class="handin"><b>How to hand in:</b> press “Save as PDF”, choose <b>Save as PDF</b> as the printer, then upload the file to the Lesson 2 assignment in <b>Teams</b>.</div>`;
  submitted=true;
  document.body.classList.add('show-dossier'); window.scrollTo({top:0});
}
function printDossier(){
  document.title=sanitize(S.surname||S.name)+'_'+sanitize(S.cls)+'_Gladiators_L2';
  window.print();
}
function closeDossier(){ document.body.classList.remove('show-dossier'); submitted=false; }


/* ====================================================================
   CLOUD SYNC LAYER — Gladiator Dossier.  Class code + candidate number,
   no password.  Mirrors each pupil's dossier to the class store
   (Cloudflare Worker + KV) so it follows them to any device and the
   Gladiators Teacher Tracker can see tasks done, retrieval score and
   who has handed in.  Same store as the Vestigia / Y10 / Codex tools.
   ==================================================================== */
const CLOUD={ endpoint:"https://vestigia-store.mrbeasley930.workers.dev", book:"glad-l2" };
const LESSON={ id:"L2", title:"Lesson 2 · Gladiator Dossier" };
let IDENTITY=null;

function userKey(){ return IDENTITY ? (IDENTITY.cls+"::"+IDENTITY.cand) : "anon"; }
function fullKey(){ return CLOUD.book+"::"+userKey(); }
const CloudStore={
  async pull(){ if(!CLOUD.endpoint) return null;
    try{ const r=await fetch(CLOUD.endpoint+"?key="+encodeURIComponent(fullKey())); if(!r.ok) return null;
      const j=await r.json(); return j&&j.data?j.data:null; }catch(e){ return null; } },
  async push(b){ if(!CLOUD.endpoint||!IDENTITY) return false;
    try{ const r=await fetch(CLOUD.endpoint,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({key:fullKey(),cls:IDENTITY.cls,cand:IDENTITY.cand,book:CLOUD.book,
                           data:b,savedAt:new Date().toISOString()})}); return r.ok; }catch(e){ return false; } }
};

function gladSummary(){
  let total=null, completed=null;
  try{ total=TOTAL; completed=TOTAL-missingList().length; }catch(e){}
  let retTot=null; try{ retTot=RET.length; }catch(e){}
  let curStep=0; try{ curStep=step; }catch(e){}
  const fullName=((S.name||"")+(S.surname?(" "+S.surname):"")).trim();
  const submitted = (typeof document!=="undefined") && document.body.classList.contains('show-dossier');
  return { name:fullName, cls:(S.cls||""), team:(S.team||""),
           lesson:LESSON.id, title:LESSON.title,
           retScore:(S.retScore!=null?S.retScore:null), retTotal:retTot,
           completed:completed, total:total, rag:(S.rag||""),
           submitted:submitted, step:curStep, savedAt:new Date().toISOString(), __state:S };
}

let _mt=null;
function mirrorToCloud(){ if(!IDENTITY) return; clearTimeout(_mt);
  _mt=setTimeout(async()=>{ await CloudStore.push(gladSummary()); }, 600); }

/* wrap tryFinish so the "handed in" state syncs too */
const _tryFinish=tryFinish; tryFinish=function(){ _tryFinish.apply(this,arguments); mirrorToCloud(); };

/* ---- sign-in gate ---- */
function showGate(){
  const ov=document.createElement('div'); ov.id='glad-gate';
  ov.style.cssText="position:fixed;inset:0;z-index:99999;background:rgba(20,12,8,.94);display:flex;align-items:center;justify-content:center;padding:20px;font-family:Georgia,'Times New Roman',serif;";
  ov.innerHTML=
    '<div style="max-width:420px;width:100%;background:#f3e8cd;border-top:8px solid #c9a227;border-radius:12px;padding:24px 26px;color:#2a1f15;box-shadow:0 18px 50px rgba(0,0,0,.55);">'
    +'<div style="font-size:12px;letter-spacing:2px;color:#7c1a16;font-weight:700;text-transform:uppercase;">Roman Gladiators</div>'
    +'<div style="font-size:23px;color:#5a110e;font-weight:700;margin:2px 0 4px;">Lesson 2 · Gladiator Dossier</div>'
    +'<div style="font-size:13px;color:#4a3a28;margin-bottom:16px;">Sign in so your dossier saves and follows you to any computer. You still type your name inside.</div>'
    +'<label style="font-size:13px;color:#7c1a16;font-weight:700;">Class code</label>'
    +'<input id="g-cls" autocomplete="off" placeholder="e.g. 8B-LAT" style="width:100%;box-sizing:border-box;margin:5px 0 12px;padding:10px;border-radius:7px;border:1px solid #b09a6a;background:#fffdf5;font-size:15px;font-family:inherit;">'
    +'<label style="font-size:13px;color:#7c1a16;font-weight:700;">Your name</label>'
    +'<input id="g-cand" autocomplete="off" placeholder="e.g. Marcus" style="width:100%;box-sizing:border-box;margin:5px 0 4px;padding:10px;border-radius:7px;border:1px solid #b09a6a;background:#fffdf5;font-size:15px;font-family:inherit;">'
    +'<div id="g-err" style="color:#7c1a16;font-size:12.5px;min-height:17px;margin:3px 0 6px;"></div>'
    +'<button id="g-go" style="width:100%;padding:12px;border:0;border-radius:7px;background:#7c1a16;color:#f3e8cd;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;letter-spacing:1px;">Enter the school</button>'
    +'<div style="font-size:11.5px;color:#6a5638;margin-top:13px;line-height:1.5;">Enter your <b>name</b> (or candidate number). Your class code comes from your teacher.</div>'
    +'</div>';
  document.body.appendChild(ov);
  document.getElementById('g-go').addEventListener('click',signIn);
  ov.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); signIn(); } });
  document.getElementById('g-cls').focus();
}
async function signIn(){
  const cls=(document.getElementById('g-cls').value||'').trim().toUpperCase();
  const cand=(document.getElementById('g-cand').value||'').trim();
  const err=document.getElementById('g-err');
  if(!cls){ err.textContent='Enter your class code.'; return; }
  if(!/^.{2,40}$/.test(cand)){ err.textContent='Please enter your name (2-40 characters).'; return; }
  IDENTITY={cls:cls,cand:cand};
  KEY=KEY_BASE+"_"+cls+"_"+cand;
  const go2=document.getElementById('g-go'); if(go2) go2.textContent='Opening…';
  const remote=await CloudStore.pull();
  if(remote && remote.__state){ try{ localStorage.setItem(KEY,JSON.stringify(remote.__state)); }catch(e){} }
  S=loadState();
  const g=document.getElementById('glad-gate'); if(g) g.remove();
  render(); mirrorToCloud();
}
function signOut(){ IDENTITY=null; location.reload(); }

function bootGladiator(){ showGate(); }

bootGladiator();
</script>
